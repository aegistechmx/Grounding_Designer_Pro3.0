version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: grounding_designer
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - grounding_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - grounding_network

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - grounding_network

  fem-worker:
    build: ./workers/fem
    environment:
      REDIS_HOST: redis
      NODE_ENV: production
    depends_on:
      - redis
    networks:
      - grounding_network
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2GB

  ai-worker:
    build: ./workers/ai
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis
    networks:
      - grounding_network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - grounding_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - grounding_network

volumes:
  postgres_data:

networks:
  grounding_network:
    driver: bridge
