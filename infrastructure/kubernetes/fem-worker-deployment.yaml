apiVersion: apps/v1
kind: Deployment
metadata:
  name: fem-worker
  namespace: grounding-designer
spec:
  replicas: 5
  selector:
    matchLabels:
      app: fem-worker
  template:
    metadata:
      labels:
        app: fem-worker
    spec:
      containers:
      - name: fem-worker
        image: grounding-designer/fem-worker:latest
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        env:
        - name: REDIS_HOST
          value: "redis-service"
        - name: NODE_ENV
          value: "production"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fem-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fem-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
