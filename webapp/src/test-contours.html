<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETAP Level Contour Visualization</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // IDW Interpolation Function
        function interpolateIDW(x, y, nodes, values, power = 2) {
            let numerator = 0;
            let denominator = 0;
            
            for (let i = 0; i < nodes.length; i++) {
                const dx = x - nodes[i].x;
                const dy = y - nodes[i].y;
                const distance = Math.sqrt(dx * dx + dy * dy) || 0.0001;
                
                // Engineering constraint: avoid unrealistic interpolation near nodes
                if (distance < 0.5) {
                    return values[i];
                }
                
                const weight = 1 / Math.pow(distance, power);
                numerator += weight * values[i];
                denominator += weight;
            }
            
            return numerator / denominator;
        }

        function isWithinGridBounds(x, y, nodes) {
            const xCoords = nodes.map(n => n.x);
            const yCoords = nodes.map(n => n.y);
            
            const minX = Math.min(...xCoords);
            const maxX = Math.max(...xCoords);
            const minY = Math.min(...yCoords);
            const maxY = Math.max(...yCoords);
            
            return x >= minX && x <= maxX && y >= minY && y <= maxY;
        }

        // Contour Lines Functions
        function generateContourLevels(minValue, maxValue, numLevels = 10) {
            const levels = [];
            const step = (maxValue - minValue) / (numLevels + 1);
            
            for (let i = 1; i <= numLevels; i++) {
                levels.push(minValue + step * i);
            }
            
            return levels;
        }

        function createInterpolatedField(nodes, values, resolution, interpolationPower) {
            const field = [];
            const size = resolution;
            
            for (let i = 0; i < size; i++) {
                field[i] = [];
                for (let j = 0; j < size; j++) {
                    const worldX = (i / size) * 50; // 50x50m grid
                    const worldY = (j / size) * 50;
                    
                    let interpolatedValue = 0;
                    let weightSum = 0;
                    
                    for (let k = 0; k < nodes.length; k++) {
                        const dx = worldX - nodes[k].x;
                        const dy = worldY - nodes[k].y;
                        const distance = Math.sqrt(dx * dx + dy * dy) || 0.0001;
                        
                        if (distance < 0.5) {
                            interpolatedValue = values[k];
                            weightSum = 1;
                            break;
                        }
                        
                        const weight = 1 / Math.pow(distance, interpolationPower);
                        interpolatedValue += weight * values[k];
                        weightSum += weight;
                    }
                    
                    field[i][j] = weightSum > 0 ? interpolatedValue / weightSum : 0;
                }
            }
            
            return field;
        }

        function generateContourLines(fieldData, levels, resolution) {
            const contourLines = [];
            const size = resolution;
            
            for (const level of levels) {
                const lines = traceContourLevel(fieldData, level, size);
                contourLines.push({
                    level,
                    lines,
                    color: getContourColor(level, levels)
                });
            }
            
            return contourLines;
        }

        function traceContourLevel(fieldData, level, size) {
            const lines = [];
            const cellSize = 400 / size;
            
            for (let i = 0; i < size - 1; i++) {
                for (let j = 0; j < size - 1; j++) {
                    const cell = {
                        x: i * cellSize,
                        y: j * cellSize,
                        values: [
                            fieldData[i][j],
                            fieldData[i + 1][j],
                            fieldData[i + 1][j + 1],
                            fieldData[i][j + 1]
                        ]
                    };
                    
                    const cellLines = marchSquare(cell, level, cellSize);
                    if (cellLines.length > 0) {
                        lines.push(...cellLines);
                    }
                }
            }
            
            return lines;
        }

        function getCellConfiguration(values, level) {
            let config = 0;
            if (values[0] > level) config |= 1;
            if (values[1] > level) config |= 2;
            if (values[2] > level) config |= 4;
            if (values[3] > level) config |= 8;
            return config;
        }

        function marchSquare(cell, level, cellSize) {
            const lines = [];
            const config = getCellConfiguration(cell.values, level);
            
            switch (config) {
                case 1:
                    lines.push([[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y]]);
                    break;
                case 2:
                    lines.push([[cell.x + cellSize * 0.5, cell.y], [cell.x + cellSize, cell.y + cellSize * 0.5]]);
                    break;
                case 3:
                    lines.push(
                        [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y]],
                        [[cell.x + cellSize * 0.5, cell.y + cellSize], [cell.x + cellSize, cell.y + cellSize * 0.5]]
                    );
                    break;
                case 4:
                    lines.push([[cell.x + cellSize, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y + cellSize]]);
                    break;
                case 5:
                    // Ambiguous case
                    const center1 = (cell.values[0] + cell.values[2]) / 2;
                    if (center1 > (cell.values[1] + cell.values[3]) / 2) {
                        lines.push(
                            [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y]],
                            [[cell.x + cellSize * 0.5, cell.y + cellSize], [cell.x + cellSize, cell.y + cellSize * 0.5]]
                        );
                    } else {
                        lines.push(
                            [[cell.x + cellSize * 0.5, cell.y], [cell.x + cellSize, cell.y + cellSize * 0.5]],
                            [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y + cellSize]]
                        );
                    }
                    break;
                case 6:
                    lines.push(
                        [[cell.x + cellSize * 0.5, cell.y], [cell.x + cellSize, cell.y + cellSize * 0.5]],
                        [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y + cellSize]]
                    );
                    break;
                case 7:
                    lines.push(
                        [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y]],
                        [[cell.x + cellSize * 0.5, cell.y], [cell.x + cellSize, cell.y + cellSize * 0.5]],
                        [[cell.x + cellSize * 0.5, cell.y + cellSize], [cell.x + cellSize, cell.y + cellSize * 0.5]]
                    );
                    break;
                case 8:
                    lines.push([[cell.x + cellSize * 0.5, cell.y + cellSize], [cell.x, cell.y + cellSize * 0.5]]);
                    break;
                case 9:
                    lines.push(
                        [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y + cellSize]],
                        [[cell.x + cellSize * 0.5, cell.y], [cell.x + cellSize, cell.y + cellSize * 0.5]]
                    );
                    break;
                case 10:
                    // Ambiguous case
                    const center2 = (cell.values[1] + cell.values[3]) / 2;
                    if (center2 > (cell.values[0] + cell.values[2]) / 2) {
                        lines.push(
                            [[cell.x + cellSize * 0.5, cell.y], [cell.x + cellSize, cell.y + cellSize * 0.5]],
                            [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y + cellSize]]
                        );
                    } else {
                        lines.push(
                            [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y]],
                            [[cell.x + cellSize * 0.5, cell.y + cellSize], [cell.x + cellSize, cell.y + cellSize * 0.5]]
                        );
                    }
                    break;
                case 11:
                    lines.push(
                        [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y]],
                        [[cell.x + cellSize * 0.5, cell.y], [cell.x + cellSize, cell.y + cellSize * 0.5]],
                        [[cell.x + cellSize * 0.5, cell.y + cellSize], [cell.x, cell.y + cellSize * 0.5]]
                    );
                    break;
                case 12:
                    lines.push(
                        [[cell.x + cellSize * 0.5, cell.y + cellSize], [cell.x + cellSize, cell.y + cellSize * 0.5]],
                        [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y]]
                    );
                    break;
                case 13:
                    lines.push(
                        [[cell.x + cellSize * 0.5, cell.y + cellSize], [cell.x + cellSize, cell.y + cellSize * 0.5]],
                        [[cell.x + cellSize * 0.5, cell.y], [cell.x, cell.y + cellSize * 0.5]],
                        [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y]]
                    );
                    break;
                case 14:
                    lines.push(
                        [[cell.x + cellSize * 0.5, cell.y], [cell.x + cellSize, cell.y + cellSize * 0.5]],
                        [[cell.x + cellSize * 0.5, cell.y + cellSize], [cell.x + cellSize, cell.y + cellSize * 0.5]],
                        [[cell.x, cell.y + cellSize * 0.5], [cell.x + cellSize * 0.5, cell.y]]
                    );
                    break;
            }
            
            return lines;
        }

        function getContourColor(level, levels) {
            const minLevel = Math.min(...levels);
            const maxLevel = Math.max(...levels);
            const t = (level - minLevel) / (maxLevel - minLevel);
            
            const r = Math.floor(255 * t);
            const g = Math.floor(100 * (1 - Math.abs(t - 0.5) * 2));
            const b = Math.floor(255 * (1 - t));
            
            return `rgb(${r}, ${g}, ${b})`;
        }

        function HeatmapCanvas({ 
            nodes, 
            voltages, 
            interpolationPower, 
            smoothingLevel,
            showContours,
            numContours,
            contourThickness
        }) {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || !nodes || !voltages || nodes.length === 0) return;
                
                const ctx = canvas.getContext('2d');
                
                const size = 400;
                canvas.width = size;
                canvas.height = size;

                // Clear canvas
                ctx.fillStyle = '#f3f4f6';
                ctx.fillRect(0, 0, size, size);

                const max = Math.max(...voltages);
                const min = Math.min(...voltages);
                const range = max - min || 1;

                // Calculate resolution based on smoothing level
                const resolution = Math.floor(50 + smoothingLevel * 100);
                const cellSize = size / resolution;

                // Create smooth interpolated field
                for (let i = 0; i < resolution; i++) {
                    for (let j = 0; j < resolution; j++) {
                        const worldX = (i / resolution) * 50;
                        const worldY = (j / resolution) * 50;
                        
                        if (isWithinGridBounds(worldX, worldY, nodes)) {
                            const interpolatedValue = interpolateIDW(worldX, worldY, nodes, voltages, interpolationPower);
                            
                            const t = (interpolatedValue - min) / range;

                            const r = Math.floor(255 * t);
                            const g = Math.floor(100 * (1 - Math.abs(t - 0.5) * 2));
                            const b = Math.floor(255 * (1 - t));

                            ctx.fillStyle = `rgb(${r},${g},${b})`;
                            ctx.fillRect(i * cellSize, j * cellSize, cellSize, cellSize);
                        }
                    }
                }

                // Apply smoothing effect
                if (smoothingLevel > 0.3) {
                    ctx.globalAlpha = 0.1 * smoothingLevel;
                    ctx.drawImage(canvas, 0, 0);
                    ctx.globalAlpha = 1;
                }

                // Draw contour lines (equipotentials)
                if (showContours && nodes && voltages) {
                    const fieldData = createInterpolatedField(nodes, voltages, resolution, interpolationPower);
                    const contourLevels = generateContourLevels(min, max, numContours);
                    const contourLines = generateContourLines(fieldData, contourLevels, resolution);
                    
                    contourLines.forEach(contour => {
                        ctx.strokeStyle = contour.color;
                        ctx.lineWidth = contourThickness;
                        ctx.globalAlpha = 0.8;
                        
                        contour.lines.forEach(line => {
                            ctx.beginPath();
                            ctx.moveTo(line[0][0], line[0][1]);
                            ctx.lineTo(line[1][0], line[1][1]);
                            ctx.stroke();
                        });
                    });
                    
                    ctx.globalAlpha = 1;
                }

                // Draw grid overlay
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.lineWidth = 0.5;
                
                for (let i = 0; i <= 10; i++) {
                    const pos = (i / 10) * size;
                    ctx.beginPath();
                    ctx.moveTo(pos, 0);
                    ctx.lineTo(pos, size);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(0, pos);
                    ctx.lineTo(size, pos);
                    ctx.stroke();
                }

                // Draw engineering overlay
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.lineWidth = 2;
                
                const gridSize = Math.sqrt(nodes.length);
                const spacing = size / (gridSize - 1);
                
                for (let row = 0; row < gridSize; row++) {
                    ctx.beginPath();
                    for (let col = 0; col < gridSize; col++) {
                        const x = col * spacing;
                        const y = row * spacing;
                        if (col === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.stroke();
                }
                
                for (let col = 0; col < gridSize; col++) {
                    ctx.beginPath();
                    for (let row = 0; row < gridSize; row++) {
                        const x = col * spacing;
                        const y = row * spacing;
                        if (row === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.stroke();
                }

            }, [nodes, voltages, interpolationPower, smoothingLevel, showContours, numContours, contourThickness]);

            return (
                <div className="relative">
                    <canvas 
                        ref={canvasRef} 
                        className="border rounded-lg shadow-lg"
                        style={{ width: '400px', height: '400px' }}
                    />
                    
                    <div className="mt-4 flex items-center justify-center space-x-4">
                        <div className="flex items-center space-x-2">
                            <div className="w-4 h-4 bg-blue-500 rounded"></div>
                            <span className="text-sm text-gray-600">Low Voltage</span>
                        </div>
                        <div className="flex items-center space-x-2">
                            <div className="w-4 h-4 bg-green-500 rounded"></div>
                            <span className="text-sm text-gray-600">Medium</span>
                        </div>
                        <div className="flex items-center space-x-2">
                            <div className="w-4 h-4 bg-red-500 rounded"></div>
                            <span className="text-sm text-gray-600">High Voltage</span>
                        </div>
                    </div>
                    
                    {voltages && voltages.length > 0 && (
                        <div className="mt-2 text-center text-sm text-gray-500">
                            Range: {Math.min(...voltages).toFixed(0)}V - {Math.max(...voltages).toFixed(0)}V
                        </div>
                    )}
                </div>
            );
        }

        function ContourControls({ 
            showContours, 
            numContours, 
            contourThickness,
            onShowContoursChange, 
            onNumContoursChange, 
            onContourThicknessChange 
        }) {
            return (
                <div className="bg-white rounded-lg shadow-lg p-4 mb-4">
                    <h3 className="text-lg font-semibold text-gray-800 mb-4">Equipotential Controls</h3>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                Show Equipotential Lines
                            </label>
                            <label className="flex items-center space-x-3">
                                <input
                                    type="checkbox"
                                    checked={showContours}
                                    onChange={(e) => onShowContoursChange(e.target.checked)}
                                    className="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded"
                                />
                                <span className="text-sm text-gray-700">
                                    {showContours ? 'Enabled' : 'Disabled'}
                                </span>
                            </label>
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                Number of Contours
                            </label>
                            <input
                                type="range"
                                min="5"
                                max="20"
                                step="1"
                                value={numContours}
                                onChange={(e) => onNumContoursChange(parseInt(e.target.value))}
                                className="w-full h-2 bg-gray-200 rounded-lg"
                                disabled={!showContours}
                            />
                            <div className="flex justify-between text-xs text-gray-500 mt-1">
                                <span>Levels: {numContours}</span>
                            </div>
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                Line Thickness
                            </label>
                            <input
                                type="range"
                                min="1"
                                max="4"
                                step="0.5"
                                value={contourThickness}
                                onChange={(e) => onContourThicknessChange(parseFloat(e.target.value))}
                                className="w-full h-2 bg-gray-200 rounded-lg"
                                disabled={!showContours}
                            />
                            <div className="flex justify-between text-xs text-gray-500 mt-1">
                                <span>Width: {contourThickness.toFixed(1)}px</span>
                            </div>
                        </div>
                    </div>

                    <div className="mt-4 p-3 bg-purple-50 rounded-lg">
                        <h4 className="text-sm font-semibold text-purple-800 mb-2">Engineering Notes</h4>
                        <ul className="text-xs text-purple-700 space-y-1">
                            <li>Contour lines represent equipotential voltage levels</li>
                            <li>Uses Marching Squares algorithm for accurate contour generation</li>
                            <li>Color-coded to match voltage gradient (blue=low, red=high)</li>
                            <li>Essential for identifying voltage concentration zones</li>
                        </ul>
                    </div>
                </div>
            );
        }

        function TestApp() {
            const [interpolationPower, setInterpolationPower] = useState(2);
            const [smoothingLevel, setSmoothingLevel] = useState(0.5);
            const [showContours, setShowContours] = useState(true);
            const [numContours, setNumContours] = useState(10);
            const [contourThickness, setContourThickness] = useState(2);
            
            const [testData, setTestData] = useState({
                nodes: [
                    {x: 0, y: 0}, {x: 8.33, y: 0}, {x: 16.67, y: 0}, {x: 25, y: 0}, {x: 33.33, y: 0}, {x: 41.67, y: 0}, {x: 50, y: 0},
                    {x: 0, y: 7.5}, {x: 8.33, y: 7.5}, {x: 16.67, y: 7.5}, {x: 25, y: 7.5}, {x: 33.33, y: 7.5}, {x: 41.67, y: 7.5}, {x: 50, y: 7.5},
                    {x: 0, y: 15}, {x: 8.33, y: 15}, {x: 16.67, y: 15}, {x: 25, y: 15}, {x: 33.33, y: 15}, {x: 41.67, y: 15}, {x: 50, y: 15},
                    {x: 0, y: 22.5}, {x: 8.33, y: 22.5}, {x: 16.67, y: 22.5}, {x: 25, y: 22.5}, {x: 33.33, y: 22.5}, {x: 41.67, y: 22.5}, {x: 50, y: 22.5},
                    {x: 0, y: 30}, {x: 8.33, y: 30}, {x: 16.67, y: 30}, {x: 25, y: 30}, {x: 33.33, y: 30}, {x: 41.67, y: 30}, {x: 50, y: 30}
                ],
                voltages: [
                    1200, 1150, 1100, 1050, 1000, 950, 900,
                    1180, 1130, 1080, 1030, 980, 930, 880,
                    1160, 1110, 1060, 1010, 960, 910, 860,
                    1140, 1090, 1040, 990, 940, 890, 840,
                    1120, 1070, 1020, 970, 920, 870, 820
                ]
            });

            return (
                <div className="min-h-screen bg-gray-50 p-8">
                    <div className="max-w-6xl mx-auto">
                        <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">
                                ETAP Level: Heatmap + Equipotential Contours
                            </h1>
                            <p className="text-gray-600">
                                Advanced visualization combining interpolated heatmap with equipotential contour lines.
                                This represents the physical solver output with professional-grade analysis capabilities.
                            </p>
                        </div>

                        <ContourControls
                            showContours={showContours}
                            numContours={numContours}
                            contourThickness={contourThickness}
                            onShowContoursChange={setShowContours}
                            onNumContoursChange={setNumContours}
                            onContourThicknessChange={setContourThickness}
                        />

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="bg-white rounded-lg shadow-lg p-6">
                                <h2 className="text-xl font-bold text-gray-800 mb-4">
                                    ETAP-Level Visualization
                                </h2>
                                <div className="flex flex-col items-center space-y-4">
                                    <HeatmapCanvas 
                                        nodes={testData.nodes}
                                        voltages={testData.voltages}
                                        interpolationPower={interpolationPower}
                                        smoothingLevel={smoothingLevel}
                                        showContours={showContours}
                                        numContours={numContours}
                                        contourThickness={contourThickness}
                                    />
                                    <div className="text-sm text-gray-600 text-center max-w-md">
                                        Professional-grade visualization with equipotential contour lines.
                                        Combines IDW interpolation with Marching Squares algorithm for accurate field representation.
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-lg shadow-lg p-6">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">Engineering Analysis</h3>
                                <div className="space-y-4">
                                    <div className="bg-red-50 p-4 rounded-lg">
                                        <h4 className="font-semibold text-red-800">High Risk Zones</h4>
                                        <p className="text-sm text-red-700 mt-1">
                                            Red contours show voltage concentration at grid edges - typical edge effect in grounding systems.
                                        </p>
                                    </div>
                                    
                                    <div className="bg-blue-50 p-4 rounded-lg">
                                        <h4 className="font-semibold text-blue-800">Safe Zones</h4>
                                        <p className="text-sm text-blue-700 mt-1">
                                            Blue contours indicate lower voltage distribution in grid interior areas.
                                        </p>
                                    </div>

                                    <div className="bg-purple-50 p-4 rounded-lg">
                                        <h4 className="font-semibold text-purple-800">Contour Analysis</h4>
                                        <ul className="text-sm text-purple-700 mt-2 space-y-1">
                                            <li>Contour density: {numContours} equipotential levels</li>
                                            <li>Line thickness: {contourThickness.toFixed(1)}px</li>
                                            <li>Status: {showContours ? 'Contours visible' : 'Contours hidden'}</li>
                                            <li>Algorithm: Marching Squares with IDW field</li>
                                        </ul>
                                    </div>

                                    <div className="bg-green-50 p-4 rounded-lg">
                                        <h4 className="font-semibold text-green-800">ETAP-Level Features</h4>
                                        <ul className="text-sm text-green-700 mt-2 space-y-1">
                                            <li>Continuous field interpolation</li>
                                            <li>Accurate equipotential lines</li>
                                            <li>Physical solver representation</li>
                                            <li>Professional engineering analysis</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<TestApp />, document.getElementById('root'));
    </script>
</body>
</html>
